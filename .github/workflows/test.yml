name: Test Frontend

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # This is important: we need to fetch the full history and have write access
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install dependencies
        # Temporarily remove frozen-lockfile to allow updates
        run: yarn install
      - name: Check if yarn.lock changed
        id: lockfile-check
        run: |
          if git diff --name-only | grep -q "yarn.lock"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Commit updated yarn.lock
        if: steps.lockfile-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yarn.lock
          git commit -m "Update yarn.lock [skip ci]"
          git push
      - name: Lint
        run: yarn lint
      - name: Build
        run: yarn build
