name: Test Frontend

on: [push, pull_request]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install
      - name: Check if yarn.lock changed
        id: lockfile-check
        run: |
          git diff --quiet yarn.lock || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Create Pull Request
        if: steps.lockfile-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ARF_GITHUB_PAT }}
          commit-message: Update yarn.lock [skip ci]
          title: 'Update yarn.lock'
          body: |
            This PR updates `yarn.lock` after dependency changes.
            It was automatically generated by the CI workflow.
          branch: update-yarn-lock
          base: ${{ github.ref_name }}
          delete-branch: true
      - name: Lint
        run: yarn lint
      - name: Build
        run: yarn build
