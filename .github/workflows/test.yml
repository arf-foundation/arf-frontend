name: Test Frontend

on: [push, pull_request]

permissions:
  contents: read      # minimum needed for checkout (read-only)
  pull-requests: read # optional, for PR triggers

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # No token needed – uses default GITHUB_TOKEN which has read access to the repo
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test --coverage

      - name: Build
        run: yarn build
